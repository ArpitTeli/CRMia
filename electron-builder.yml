appId: com.manager-crm.app
productName: Manager CRM
directories:
  output: release
files:
  - dist/**/*
  - package.json
publish:
  provider: github
  releaseType: release
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: "${productName}-${version}.${ext}"
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
