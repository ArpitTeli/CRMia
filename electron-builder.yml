appId: com.manager-crm.app
productName: Manager CRM
directories:
  output: release
files:
  - dist/**/*
  - package.json
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.icns
linux:
  target:
    - AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
